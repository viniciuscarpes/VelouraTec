<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="shortcut icon" href="imgs/letra-v.png" type="image/x-icon">
    <script src="js/login.js" defer></script>
</head>

<body>
    <div class="geral">
        <form class="form" onsubmit="return false">
            <img src="imgs/letra-v.png" alt="" height="45px" class="img-v">
            <h2 class="text-form">Velura</h2>
            <p class="p-form">A sua empresa de vendas de tecnologia</p>
            <input type="text" placeholder="Username/email" class="info" id="nomeDeUsuario">
            <input type="password" placeholder="password" class="info" id="sennhaDigitada">
            <div class="btn-esqueci">
                <button class="btn" onclick="validarLogin()"> Concluir login </button>
                <a href="http://127.0.0.1:5500/home.html" class="esqueci">Voltar ao site como visitante</a>
            </div>
        </form>
    </div>
</body>

</html>
